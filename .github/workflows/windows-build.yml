name: Build Windows Portable ZIP

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'CMakeLists.txt'
      - 'Source/**'
      - 'assets/**'
      - 'config/**'
      - '.github/workflows/windows-build.yml'

jobs:
  build-windows:
    name: Build portable Windows artifact
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build Release
        shell: pwsh
        run: |
          cmake --build build --config Release --target MusiVSTGuitarHost --parallel

      - name: Create portable folder
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $portable = "MusiVST-GuitarHost-Portable-Windows"
          if (Test-Path $portable) { Remove-Item $portable -Recurse -Force }
          New-Item -ItemType Directory -Path $portable | Out-Null

          $exe = Get-ChildItem -Path build -Recurse -File |
            Where-Object { ($_.Name -eq "MusiVST Guitar Host.exe" -or $_.Name -eq "MusiVSTGuitarHost.exe") -and $_.FullName -match "Release" } |
            Select-Object -First 1

          if (-not $exe) {
            Write-Host "No executable found. Listing build files for debugging:"
            Get-ChildItem -Path build -Recurse -File | Select-Object FullName
            throw "Executable not found"
          }

          Copy-Item $exe.FullName "$portable/MusiVST Guitar Host.exe" -Force
          Copy-Item "config" "$portable/config" -Recurse -Force
          Copy-Item "assets" "$portable/assets" -Recurse -Force
          Copy-Item "README.md" "$portable/README.txt" -Force

          if (Test-Path "MusiVST-GuitarHost-Portable-Windows.zip") {
            Remove-Item "MusiVST-GuitarHost-Portable-Windows.zip" -Force
          }

          Compress-Archive -Path $portable -DestinationPath "MusiVST-GuitarHost-Portable-Windows.zip" -Force

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: MusiVST-GuitarHost-Portable-Windows
          path: MusiVST-GuitarHost-Portable-Windows.zip
          if-no-files-found: error
